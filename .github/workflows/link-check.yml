name: Weekly Link Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    name: Check for broken links in markdown files

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check links in all markdown files
        run: |
          find . -name "*.md" \
            -not -path "./.git/*" \
            -not -path "./site/*" \
            | xargs -I {} markdown-link-check {} \
              --config .markdown-link-check.json \
              --quiet || true

      - name: Create issue if links are broken
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Broken links detected in weekly link check',
              body: 'The weekly link check workflow detected broken links. Please review the workflow run for details.',
              labels: ['documentation', 'automated']
            })
