site_name: Copilot Agent Playbook
site_description: 35 production-ready Microsoft 365 Copilot agent ideas for enterprise environments
site_url: https://rohirik.github.io/copilot-agent-playbook
repo_url: https://github.com/RohiRIK/copilot-agent-playbook
repo_name: copilot-agent-playbook

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags
  - awesome-pages

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/RohiRIK/copilot-agent-playbook

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Agent Catalog:
    - All Agents: catalog/index.md
    - By Domain: catalog/by-domain.md
  - Architecture:
    - Agent Patterns: architecture/agent-patterns.md
    - Governance Framework: architecture/governance-framework.md
    - Reference Architecture: architecture/reference-architecture.md
    - Deployment Guide: architecture/deployment-guide.md
  - ...
